vich_uploader:
    db_driver: orm
    mappings:
        bingo_item_image:
            uri_prefix: /uploads/items
            upload_destination: '%kernel.project_dir%/public/uploads/items'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            delete_on_remove: true
            delete_on_update: true
