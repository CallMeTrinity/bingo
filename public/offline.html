<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hors-ligne — Bingo</title>
    <meta name="theme-color" content="#cdb4db">
    <link rel="icon" href="/logo.png">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fbf6ee;
            color: #2a2640;
            padding: 2rem;
        }
        .card {
            max-width: 28rem;
            text-align: center;
        }
        .icon {
            width: 5rem;
            height: 5rem;
            margin: 0 auto 1.5rem;
            border-radius: 1.5rem;
            background: #cdb4db;
            display: grid;
            place-items: center;
            font-size: 2.5rem;
        }
        h1 {
            font-family: 'Instrument Serif', Georgia, serif;
            font-size: 1.75rem;
            margin: 0 0 0.5rem;
            font-weight: 400;
        }
        p {
            color: #6b6685;
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0 0 1.5rem;
        }
        button {
            border: 1px solid rgba(42, 38, 64, .15);
            background: #fff;
            color: #2a2640;
            padding: 0.6rem 1.2rem;
            border-radius: 0.75rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
        }
        button:hover { background: #f3ecdf; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">☁︎</div>
        <h1>Toi et tes bingos êtes hors-ligne</h1>
        <p>La connexion semble interrompue. Une fois revenue, ta grille te retrouvera.</p>
        <button onclick="location.reload()">Réessayer</button>
    </div>
</body>
</html>
